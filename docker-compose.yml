services:
  schism-api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      SCHISM_DATABASE_URL: sqlite:///./data/schism.db
      SCHISM_QDRANT_URL: http://schism-qdrant:6333
      SCHISM_QDRANT_COLLECTION: schism_claims
      SCHISM_ENABLE_QDRANT: "true"
    volumes:
      - ./data:/app/data
    depends_on:
      - schism-qdrant
      - schism-redis

  schism-qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  schism-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  qdrant_data:
