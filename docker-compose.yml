services:
  schism-api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      SCHISM_DATABASE_URL: sqlite:///./data/schism.db
      SCHISM_QDRANT_URL: http://schism-qdrant:6333
      SCHISM_QDRANT_COLLECTION: schism_claims
      SCHISM_ENABLE_QDRANT: "true"
    volumes:
      - ./data:/app/data
    depends_on:
      - schism-qdrant

  schism-qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  schism-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - SCHISM_API_PROXY_TARGET=http://schism-api:8000
    depends_on:
      - schism-api

volumes:
  qdrant_data: